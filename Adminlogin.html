<html>
<head>
<title>Hospital Login</title>
<link rel="stylesheet" href="/appointment.html">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
    body { font-family: 'Segoe UI', sans-serif; }
    .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
    .section-padding { padding: 10% 0; }
    .footer {
        background-color: #0d6efd;
        color: white;
        padding: 20px 0;
        text-align: center;
        
    }
    </style>
</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">Multicare Hospital</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/services.html" target="_blank">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="/docters.html" target="_blank">Doctors</a></li>
        <li class="nav-item"><a class="nav-link" href="/appointment.html" target="_blank">Appointment</a></li>
      </ul>
    </div>
  </div>
  </nav><section class="hero" id="home">
    <div class="container">
        <h1>Welcome to Multicare Hospital</h1>
        <p>Your Health, Our Priority</p>
        <a href="/index.html" class="btn btn-light btn-lg">Home</a>
    </div>
    <section class="section-padding" id="admin">
    <div class="container">
        <h2 class="text-center">Admin Login</h2>
        <div class="row justify-content-center mt-4">
            <div class="col-md-4">
                <input type="password" id="adminPass" class="form-control" placeholder="Enter Admin Password">
                <button class="btn btn-primary mt-3 w-100" onclick="adminLogin()">Login</button>
            </div>
        </div>
    </div>
   
     <div class="dashboard mt-5" id="dashboard">
            <h4>Appointment Records</h4>
            <ul id="appointmentList" class="list-group mt-3"></ul>
        </div>
    </section>
    <script>
        async function adminLogin() {
    const passwordInput = document.getElementById('adminPass').value;

    try {
        // We send the password to the back-end (port 3000)
        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: passwordInput })
        });

        const result = await response.json();

        if (result.success) {
            // Only show dashboard if server says YES
            document.getElementById('dashboard').style.display = 'block';
            loadAppointments();
        } else {
            alert('Incorrect Password');
        }
    } catch (error) {
        alert('Server is offline. Start the Node.js back-end first!');
    }
}

function loadAppointments() {
    const list = document.getElementById('appointmentList');
    list.innerHTML = '';
    let appointments = JSON.parse(localStorage.getItem('appointments')) || [];
    appointments.forEach(app => {
        const li = document.createElement('li');
        li.className = 'list-group-item text-dark'; // Added text-dark for visibility
        li.textContent = `${app.name} | ${app.phone} | ${app.date} | ${app.doctor}`;
        list.appendChild(li);
    });
}

    </script>
     <footer class="footer">

</footer>
